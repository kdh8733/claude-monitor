name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # 수집기는 런타임 의존성이 0 이어야 한다. 늘어나면 여기서 막는다.
      - name: collector has zero runtime dependencies
        run: |
          node -e '
            const deps = require("./package.json").dependencies ?? {};
            const web = new Set(["next","react","react-dom","@visx/scale","@visx/shape","@visx/group"]);
            const extra = Object.keys(deps).filter((d) => !web.has(d));
            if (extra.length) { console.error("web 이 아닌 런타임 의존성:", extra); process.exit(1); }
            console.log("런타임 의존성:", Object.keys(deps).join(", ") || "(없음)");
          '

      - run: npm test
      - run: npx tsc --noEmit
      - run: npx tsc --noEmit -p web/tsconfig.json

      # CI 러너에는 data/ 가 애초에 없다. 데모 빌드가 성공한다는 것 자체가
      # "실데이터 없이도 빌드된다"의 증명이다.
      - run: npm run build

      - name: no real data in the build (completion criterion 6)
        run: node scripts/canary.mjs web/out

  # 배포는 verify 가 통과한 뒤에만. 카나리를 통과하지 못한 빌드는 절대 공개되지 않는다.
  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # secrets 는 step if: 에서 직접 비교하면 평가되지 않는다. job env 로 끌어올린다.
      HAS_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build

      # 배포 직전에 한 번 더. 공개되는 것은 카나리를 통과한 산출물뿐이다.
      - name: canary before deploy
        run: node scripts/canary.mjs web/out

      # VERCEL_ORG_ID / VERCEL_PROJECT_ID 만 있으면 CLI 가 링크 없이도 같은 프로젝트를 찾는다
      # (로컬에서 링크 없는 디렉터리로 검증함. 없으면 새 프로젝트를 만들어버린다).
      # 토큰 형태 진단 (값은 마스킹). "~"·공백·따옴표가 섞이면 여기서 드러난다.
      - name: check token shape
        if: env.HAS_TOKEN == 'true'
        env:
          T: ${{ secrets.VERCEL_TOKEN }}
        run: |
          printf 'length=%s\n' "${#T}"
          printf 'has_tilde=%s has_space=%s has_quote=%s has_newline=%s\n' \
            "$(case "$T" in *"~"*) echo yes;; *) echo no;; esac)" \
            "$(case "$T" in *" "*) echo yes;; *) echo no;; esac)" \
            "$(case "$T" in *'"'*|*"'"*) echo yes;; *) echo no;; esac)" \
            "$(printf '%s' "$T" | wc -l)"
          printf 'starts_with_prefix=%s\n' "$(case "$T" in [A-Za-z0-9]*) echo yes;; *) echo no;; esac)"

      # 토큰은 --token 인자가 아니라 VERCEL_TOKEN 환경변수로 넘긴다 (프로세스 목록 노출 방지).
      - name: deploy to vercel
        if: env.HAS_TOKEN == 'true'
        working-directory: web/out
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prod --yes

      - name: skipped (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "VERCEL_TOKEN 시크릿이 없어 배포를 건너뛴다. 대시보드에서 발급 후 gh secret set VERCEL_TOKEN"
